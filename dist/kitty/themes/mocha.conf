# The basic colors
foreground              #d7d7d7
background              #202020
selection_foreground    #202020
selection_background    #f3e1dd

# Cursor colors
cursor                  #f3e1dd
cursor_text_color       #202020

# Scrollbar colors
scrollbar_handle_color  #9a9a9a
scrollbar_track_color   #494949

# URL color when hovering with mouse
url_color               #f3e1dd

# Kitty window border colors
active_border_color     #b5bff8
inactive_border_color   #717171
bell_border_color       #f7e2b5

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #121212
active_tab_background   #c9a8f1
inactive_tab_foreground #d7d7d7
inactive_tab_background #191919
tab_bar_background      #121212

# Colors for marks (marked text in the terminal)
mark1_foreground #202020
mark1_background #b5bff8
mark2_foreground #202020
mark2_background #c9a8f1
mark3_foreground #202020
mark3_background #7dc6e7

