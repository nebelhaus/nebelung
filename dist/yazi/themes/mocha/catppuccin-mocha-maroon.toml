[app]
overall = { bg = "#202020" }

[mgr]
cwd = { fg = "#9be0d5" }

find_keyword  = { fg = "#f7e2b5", italic = true }
find_position = { fg = "#f2c4e5", bg = "reset", italic = true }

marker_copied   = { fg = "#abe1a6", bg = "#abe1a6" }
marker_cut      = { fg = "#ed8fa9", bg = "#ed8fa9" }
marker_marked   = { fg = "#9be0d5", bg = "#9be0d5" }
marker_selected = { fg = "#e6a3ad", bg = "#e6a3ad" }

count_copied   = { fg = "#202020", bg = "#abe1a6" }
count_cut      = { fg = "#202020", bg = "#ed8fa9" }
count_selected = { fg = "#202020", bg = "#e6a3ad" }

border_symbol = "│"
border_style  = { fg = "#858585" }

syntect_theme = "~/.config/yazi/Catppuccin-mocha.tmTheme"

[tabs]
active   = { fg = "#202020", bg = "#d7d7d7", bold = true }
inactive = { fg = "#d7d7d7", bg = "#494949" }

[mode]
normal_main = { fg = "#202020", bg = "#e6a3ad", bold = true }
normal_alt  = { fg = "#e6a3ad", bg = "#343434"}

select_main = { fg = "#202020", bg = "#abe1a6", bold = true }
select_alt  = { fg = "#abe1a6", bg = "#343434"}

unset_main  = { fg = "#202020", bg = "#efcece", bold = true }
unset_alt   = { fg = "#efcece", bg = "#343434"}

[indicator]
parent = { fg = "#202020", bg = "#d7d7d7" }
current = { fg = "#202020", bg = "#e6a3ad" }
preview = { fg = "#202020", bg = "#d7d7d7" }

[status]
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label  = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#abe1a6", bg = "#494949" }
progress_error  = { fg = "#f7e2b5", bg = "#ed8fa9" }

perm_type  = { fg = "#8db4f3" }
perm_read  = { fg = "#f7e2b5" }
perm_write = { fg = "#ed8fa9" }
perm_exec  = { fg = "#abe1a6" }
perm_sep   = { fg = "#858585" }

[input]
border   = { fg = "#e6a3ad" }
title    = {}
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "#e6a3ad" }
active   = { fg = "#f2c4e5" }
inactive = {}

[confirm]
border     = { fg = "#e6a3ad" }
title      = { fg = "#e6a3ad" }
body       = {}
list       = {}
btn_yes    = { reversed = true }
btn_no     = {}

[cmp]
border = { fg = "#e6a3ad" }

[tasks]
border  = { fg = "#e6a3ad" }
title   = {}
hovered = { fg = "#f2c4e5", bold = true }

[which]
mask            = { bg = "#343434" }
cand            = { fg = "#9be0d5" }
rest            = { fg = "#9a9a9a" }
desc            = { fg = "#f2c4e5" }
separator       = "  "
separator_style = { fg = "#5c5c5c" }

[help]
on      = { fg = "#9be0d5" }
run     = { fg = "#f2c4e5" }
desc    = { fg = "#9a9a9a" }
hovered = { bg = "#5c5c5c", bold = true }
footer  = { fg = "#d7d7d7", bg = "#494949" }

[notify]
title_info  = { fg = "#9be0d5" }
title_warn  = { fg = "#f7e2b5" }
title_error = { fg = "#ed8fa9" }

[filetype]
rules = [
	# Media
	{ mime = "image/*", fg = "#f7e2b5" },
	{ mime = "{audio,video}/*", fg = "#f2c4e5" },

	# Archives
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#ed8fa9" },

	# Documents
	{ mime = "application/{pdf,doc,rtf}", fg = "#91dbe8" },

	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "#494949" },

	# Special file
	{ url = "*", is = "orphan", bg = "#ed8fa9" },
	{ url = "*", is = "exec"  , fg = "#abe1a6" },

	# Dummy file
	{ url = "*", is = "dummy", bg = "#ed8fa9" },
	{ url = "*/", is = "dummy", bg = "#ed8fa9" },

	# Fallback
	{ url = "*/", fg = "#e6a3ad" },
]

[spot]
border = { fg = "#e6a3ad" }
title  = { fg = "#e6a3ad" }
tbl_cell = { fg = "#e6a3ad", reversed = true }
tbl_col = { bold = true }

[icon]
dirs = [
	{ name = ".config", text = "", fg = "#e6a3ad" },
	{ name = ".git", text = "", fg = "#e6a3ad" },
	{ name = ".github", text = "", fg = "#e6a3ad" },
	{ name = ".npm", text = "", fg = "#e6a3ad" },
	{ name = "Desktop", text = "", fg = "#e6a3ad" },
	{ name = "Development", text = "", fg = "#e6a3ad" },
	{ name = "Documents", text = "", fg = "#e6a3ad" },
	{ name = "Downloads", text = "", fg = "#e6a3ad" },
	{ name = "Library", text = "", fg = "#e6a3ad" },
	{ name = "Movies", text = "", fg = "#e6a3ad" },
	{ name = "Music", text = "", fg = "#e6a3ad" },
	{ name = "Pictures", text = "", fg = "#e6a3ad" },
	{ name = "Public", text = "", fg = "#e6a3ad" },
	{ name = "Videos", text = "", fg = "#e6a3ad" },
]
conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#d7d7d7" },
	{ if = "link", text = "", fg = "#aeaeae" },
	{ if = "block", text = "", fg = "#f7e2b5" },
	{ if = "char", text = "", fg = "#f7e2b5" },
	{ if = "fifo", text = "", fg = "#f7e2b5" },
	{ if = "sock", text = "", fg = "#f7e2b5" },
	{ if = "sticky", text = "", fg = "#f7e2b5" },
	{ if = "dummy", text = "", fg = "#ed8fa9" },

	# Fallback
	{ if = "dir", text = "", fg = "#e6a3ad" },
	{ if = "exec", text = "", fg = "#abe1a6" },
	{ if = "!dir", text = "", fg = "#d7d7d7" },
]
