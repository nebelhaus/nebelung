# name | template | output subdir under dist/
# Whiskers ports re-rendered against palette/nebelung.json (mocha slot).
ghostty   | templates/ghostty/ghostty.tera     | ghostty
kitty     | templates/kitty/kitty.tera         | kitty
alacritty | templates/alacritty/alacritty.tera | alacritty
starship  | templates/starship/starship.tera   | starship
btop      | templates/btop/btop.tera           | btop
tmux      | templates/tmux/tmux.tera           | tmux
slack     | templates/slack/slack.tera         | slack
zellij    | templates/zellij/zellij.tera       | zellij
delta     | templates/delta/delta.tera         | delta
fzf       | templates/fzf/fzf.tera             | fzf
lsd       | templates/lsd/lsd.tera             | lsd
# glow renders a glamour style JSON (markdown renderer; drives the yazi md previewer).
glow      | templates/glow/glow.tera           | glow
# bat renders the tmTheme (Sublime color scheme); also feeds the yazi syntect_theme.
bat       | templates/bat/bat.tmTheme.tera     | bat
zsh-syntax-highlighting | templates/zsh-syntax-highlighting/zsh-syntax-highlighting.tera | zsh-syntax-highlighting
# obsidian renders a CSS snippet; install into a vault under .obsidian/snippets/.
obsidian  | templates/obsidian/obsidian.tera   | obsidian
# lazygit + yazi carry an accent matrix — they render all 14 accents for mocha;
# consumers pick the accent folder/file they want (we use mauve, the default accent).
lazygit   | templates/lazygit/lazygit.tera     | lazygit
yazi      | templates/yazi/yazi.tera           | yazi
# zen renders all 14 accents for mocha; install the accent folder you want.
zen       | templates/zen/userChrome.tera      | zen
zen       | templates/zen/userContent.tera     | zen
opencode  | templates/opencode/opencode.tera   | opencode
# --- not whiskers-based; handled separately (TS builds off @catppuccin/palette) ---
# vscode  -> handled via catppuccin.colorOverrides settings snippet (scripts/gen-vscode.mjs)
# stylus  -> handled via scripts/gen-stylus.mjs (downloads/patches catppuccin userstyles)
